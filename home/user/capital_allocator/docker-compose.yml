version: "3.9"
services:
  allocator:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

  slack-mcp:
    build: .
    command: python -m capital_allocator.mcp.slack_server
    ports:
      - "8701:8701"
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
